repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: "RUFF (Formatter: Black)"
        entry: uv run ruff format
        language: system
        types: [python]

      - id: ruff-check
        name: "RUFF (Linter: Flake8, Isort, Pylint)"
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: mypy
        name: "MYPY (Tipagem)"
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false

      - id: bandit
        name: "BANDIT (Segurança)"
        entry: uv run bandit -c pyproject.toml -r .
        language: system
        types: [python]
        pass_filenames: false

      - id: vulture
        name: "VULTURE (Código Morto)"
        entry: uv run vulture src/
        language: system
        types: [python]
        pass_filenames: false

      - id: deptry
        name: "DEPTRY (Dependências Inúteis)"
        entry: uv run deptry .
        language: system
        pass_filenames: false

      - id: pytest
        name: "PYTEST (Testes e Coverage)"
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
