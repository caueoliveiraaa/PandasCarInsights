name: CI - Integração contínua
on:
  push:
    branches: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validacoes-e-testes:
    runs-on: windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instala uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: INSTALL - Configura Python
        run: uv python install 3.12

      - name: SYNC - Sincroniza dependências
        run: uv sync --all-extras --dev

      - name: RUFF - Lint e Format
        run: |
          uv run ruff check src/
          uv run ruff format --check src/

      - name: MYPY - Tipagem
        run: uv run mypy src/

      - name: BANDIT - Segurança
        run: uv run bandit -c pyproject.toml -r src/

      - name: VULTURE - Código morto
        run: uv run vulture src/

      - name: DEPTRY - Checagem de dependências inúteis
        run: uv run deptry src/

      - name: PYTEST - Testes e Coverage
        run: uv run pytest
